<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="fixed">
    <div class="left">
        <div class="SignUp">
            <div class="links">
                <a href="#">F</a><a href="#">G</a><a href="#">in</a>
            </div>
            <div class="formSIGN">
                <form  action="/Greet.html" method="post" class="grid1">
                <label for="uname">User-Name:</label>
                <input type="text" id="uname">
                <label for="fname">Full-Name:</label>
                <input type="text" id="fname">
                <label for="email">Email:</label>
                <input type="email" id="email">
                <label for="pwd">Set-Password:</label>
                <input type="password" id="pwd">
                <label for="conpwd">Confirm-Password:</label>
                <input type="password" id="conpwd">
                <button type="submit" class="btn">SIGN UP</button>
                </form>
            </div>
        </div>
        <div class="shape2"></div>
        <div class="Greet1">
            <h1>WELCOME BACK FELLOWS!</h1>
            <p>LAST STEP TO GET BACK STARTED WHERE YOU LEFT OFF.</p>
            <img src="img/img2.png" alt="">
        </div>
    </div>
    <div class="right">
        <div class="LogIn">
                <div class="links2">
                    <a href="#" class="facebookParent"><img src="img/facebook.png" alt="Facebook"></a><span class="facebook">FACEBOOK</span>
                    <a href="#" class="googleParent"><img src="img/GOOGLE.jpg" alt="Google"></a><span class="google">GOOGLE</span>
                    <a href="#" class="linkedinParent"><img src="img/linkedin.png" alt="LinkedIn"></a><span class="linkedin">LINKEDIN</span>
                </div>
                <div class="formSIGNRight">
                <form  action="/Greet.html" method="post" class="grid1">
                <label for="uname1">User-Name:</label>
                <input type="text" id="uname1">
                <label for="email1">Email: <span style="font-size: 0.8rem;"> (OPTIONAL)</span></label>
                <input type="email" id="email1">
                <label for="pwd1">Enter-Password:</label>
                <input type="password" id="pwd1">
                <button type="submit" class="btnRight">LOGIN</button>
                </form>
            </div>
        </div>
        <div class="shape"></div>
        <div class="greet2">
            <h2>WELCOME TO OUR PAGE!</h2>
            <p>PLEASE SIGNUP TO GET YOU JOURNEY STARTED WITH US.</p>
            <img src="img/img1.png" alt="" class="imgBgGreet">
        </div>
    </div>
    <div class="changer">
        <button class="btnChanger">LOGIN</button>
    </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js"></script>
</body>
</html>
